name: ibivibe
description: "A new Flutter project."
publish_to: 'none'

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.10.7

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  go_router: ^17.0.1
  google_fonts: ^6.2.0
  flutter_dotenv: ^6.0.0
  form_builder_validators: ^11.2.0
  forui: ^0.17.0
  forui_assets: ^0.17.1
  flutter_native_splash: ^2.4.7
  introduction_screen: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  dio: ^5.9.1
  equatable: ^2.0.7
  flutter_secure_storage: ^10.0.0
  logger: ^2.6.2
  brasil_fields: ^1.18.0
  intl: ^0.20.2
  smooth_page_indicator: ^2.0.1
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  easy_stars: ^1.0.9
  page_transition: ^2.2.1
  animations: ^2.1.1
  latlong2: ^0.9.1
  skeletonizer: ^2.1.3
  sembast: ^3.8.6
  path: ^1.9.1
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  video_player: ^2.11.0
  audio_session: ^0.2.2
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  acanthis: ^1.5.4

  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  webview_all: ^1.0.3
  webview_flutter: ^4.13.1
  flutter_inappwebview: ^6.1.5
  url_launcher: ^6.3.2
  collection: ^1.19.1
  maplibre_gl: ^0.26.0
  carousel_slider_plus: ^7.1.2
  flutter_svg: ^2.2.4
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  build_runner: ^2.13.1 # dart run build_runner build
  mocktail: ^1.0.4

  freezed: ^3.0.0
  json_serializable: ^6.13.0

flutter:
  uses-material-design: true
  assets:
  - assets/images/
  - assets/icons/

  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400

        - asset: assets/fonts/DMSans-Italic.ttf
          weight: 400
          style: italic

        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500

        - asset: assets/fonts/DMSans-MediumItalic.ttf
          weight: 500
          style: italic

        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/DMSans-SemiBoldItalic.ttf
          weight: 600
          style: italic

        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700

        - asset: assets/fonts/DMSans-BoldItalic.ttf
          weight: 700
          style: italic
  
flutter_native_splash: # dart run flutter_native_splash:create
  color: "#FFFFFF"
  image: assets/images/ib-light.png

  color_dark: "#000000"
  image_dark: assets/images/ib-dark.png

  android_12:
    color: "#FFFFFF"
    image: assets/images/ib-light.png

    color_dark: "#000000"
    image_dark: assets/images/ib-dark.png

  ios: true
  android: true